default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: github-interactions
      description: Common git and GitHub CLI operations (branching, committing, PRs, issues, labels, project board) used across agents.
      source: https://github.com/asvid/llm-tools/blob/main/skills/gh-interactions/SKILL.md

    - name: mental-memory
      description: Agent memory skill — read a YAML memory file at task start and write new learnings at task end to persist context across sessions.
      source: https://github.com/asvid/llm-tools/blob/main/skills/mental-memory/SKILL.md

    - name: tag-release
      description: Bump the app version, commit, tag, and push to trigger the release CI workflow. Use when ready to release a new version to the Play Store.
      source: https://github.com/asvid/llm-tools/blob/main/skills/tag-release/SKILL.md

    - name: grill-me
      description: Interview the user relentlessly about a plan or design until reaching shared understanding, resolving each branch of the decision tree. Use when user wants to stress-test a plan, get grilled on their design, or mentions "grill me".
      source: https://github.com/mattpocock/skills/blob/main/grill-me/SKILL.md

    - name: write-prd
      description: Create a PRD through user interview, codebase exploration, and module design, then submit as a GitHub issue. Use when user wants to write a PRD, create a product requirements document, or plan a new feature.
      source: https://github.com/mattpocock/skills/blob/main/write-a-prd/SKILL.md

    - name: write-postmortem
      description: Guide a conversational interview to produce a structured postmortem document following the team's standard template. Use when the user asks to write a postmortem, incident report, or post-incident review.
      source: ~/.claude/skills/write-postmortem/SKILL.md

    - name: write-skill
      description: Create new agent skills with proper structure, progressive disclosure, and bundled resources. Use when user wants to create, write, or build a new skill.
      source: https://github.com/mattpocock/skills/blob/main/write-a-skill/SKILL.md
  agents: []
  prompts: []
